<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
#container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}
#label-area {
  position: relative;
  height: 28px;
  width: 100%;
  flex: 0 0 28px;
}
#selection-label {
  position: absolute;
  display: none;
  pointer-events: none;
  font: bold 13px system-ui, -apple-system, sans-serif;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid;
  background: #ffffff;
  white-space: nowrap;
  z-index: 10;
  transform: translateX(-50%);
}
#chart-area {
  position: relative;
  width: 100%;
  height: 100%;
  flex: 1 1 auto;
}
#chart {
  width: 100%;
  height: 100%;
  user-select: none;
  -webkit-user-select: none;
}
#selection-rect {
  position: absolute;
  display: none;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="container">
  <div id="label-area">
    <div id="selection-label"></div>
  </div>
  <div id="chart-area">
    <div id="chart"></div>
    <div id="selection-rect"></div>
  </div>
</div>
<script>
(() => {
  const chart = echarts.init(document.getElementById("chart"));
  const options = __ECHARTS_OPTIONS__;
  const data = options.series[0].data;

  chart.setOption(options);

  let dragging = false;
  let startIndex = -1;

  const selectionRect = document.getElementById("selection-rect");
  const selectionLabel = document.getElementById("selection-label");

  const clamp = (value, minValue, maxValue) => {
    return Math.max(minValue, Math.min(value, maxValue));
  }

  const convertToIndex = (offsetX, offsetY) => {
    const point = chart.convertFromPixel("grid", [offsetX, offsetY]);
    return point ? clamp(Math.round(point[0]), 0, data.length - 1) : -1;
  }

  const getGridBounds = () => {
    const top = chart.convertToPixel("grid", [0, options.yAxis.max]);
    const bottom = chart.convertToPixel("grid", [0, options.yAxis.min]);
    return { top: top[1], height: bottom[1] - top[1] };
  }

  const showMeasure = (startIndex, endIndex) => {
    const leftIndex = Math.min(startIndex, endIndex);
    const rightIndex = Math.max(startIndex, endIndex);

    const leftPrice = data[leftIndex];
    const rightPrice = data[rightIndex];

    const priceGap = rightPrice - leftPrice;
    const priceChange = leftPrice !== 0 ? priceGap / leftPrice * 100 : 0;
    const positive = priceGap >= 0;

    const color = positive ? "#16a34a" : "#dc2626";
    const backgroundColor = positive ? "rgba(34, 197, 94, 0.2)" : "rgba(239, 68, 68, 0.2)";

    const left = chart.convertToPixel("grid", [leftIndex, 0])[0];
    const right = chart.convertToPixel("grid", [rightIndex, 0])[0];
    const gridBounds = getGridBounds();

    Object.assign(selectionRect.style, {
      position: "absolute",
      pointerEvents: "none",
      display: "block",
      left: `${left}px`,
      top: `${gridBounds.top}px`,
      width: `${right - left}px`,
      height: `${gridBounds.height}px`,
      background: backgroundColor,
    });

    const sign = positive ? "+" : "";

    selectionLabel.textContent = `${sign}${priceGap.toFixed(2)} (${sign}${priceChange.toFixed(2)}%)`;

    Object.assign(selectionLabel.style, {
      position: "absolute",
      pointerEvents: "none",
      display: "block",
      whiteSpace: "nowrap",
      font: "bold 13px system-ui, -apple-system, sans-serif",
      padding: "3px 8px",
      borderRadius: "4px",
      border: `1px solid ${color}`,
      background: "#ffffff",
      color: color,
      zIndex: 10,
      left: `${(left + right) / 2}px`,
      top: "2px",
      transform: "translateX(-50%)",
    });
  }

  const hideMeasure = () => {
    selectionRect.style.display = "none";
    selectionLabel.style.display = "none";
  }

  const endDrag = () => {
    if (!dragging) return;
    dragging = false;
    chart.setOption({ tooltip: { triggerOn: "mousemove" } });
  }

  chart.getZr().on("mousedown", (e) => {
    if (!chart.containPixel("grid", [e.offsetX, e.offsetY])) return;
    startIndex = convertToIndex(e.offsetX, e.offsetY);
    dragging = true;
    hideMeasure();
    chart.setOption({ tooltip: { triggerOn: "none" } });
    chart.dispatchAction({ type: "hideTip" });
  });

  chart.getZr().on("mousemove", (e) => {
    if (!dragging) return;
    const index = convertToIndex(e.offsetX, e.offsetY);
    if (index < 0 || index === startIndex) return;
    showMeasure(startIndex, index);
  });

  chart.getZr().on("mouseup", endDrag);
  window.addEventListener("mouseup", endDrag);
  window.addEventListener("resize", () => chart.resize());
})();
</script>
</body>
</html>
